# YAR Stack - Infrastructure Services
# Usage: ./setup.sh && ./start.sh
#
# Services:
#   - postgres:  PostgreSQL + pgvector + AGE (port 5432)
#   - rustfs:    S3-compatible document storage (ports 9100, 9101)
#   - litellm:   Unified LLM/embedding proxy (port 4000)
#
# Startup:
#   docker compose up -d

name: yar-stack

networks:
  yar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

services:
  # ══════════════════════════════════════════════════════════════════════════════
  # PostgreSQL with pgvector + Apache AGE
  # ══════════════════════════════════════════════════════════════════════════════
  postgres:
    container_name: yar-postgres
    build:
      context: ./services/postgres-age-vector
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: yar
      POSTGRES_USER: yar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yar_pass}
    ports:
      - '${DOCKER_GATEWAY_IP:-127.0.0.1}:5432:5432'
    volumes:
      - ${YAR_DATA_DIR:-./data}/postgres:/var/lib/postgresql
    command: |
      postgres
      -c shared_preload_libraries='vector,age'
      -c max_connections=150
      -c shared_buffers=768MB
      -c work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c effective_cache_size=2GB
      -c maintenance_work_mem=192MB
      -c wal_compression=on
      -c checkpoint_timeout=10min
      -c max_wal_size=1GB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=12
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4
      -c jit_above_cost=50000
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U yar -d yar']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yar-network
    mem_limit: 2g
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # RustFS - S3-compatible document storage
  # ══════════════════════════════════════════════════════════════════════════════
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.99  # Pin to alpha; bump intentionally
    container_name: yar-rustfs
    # Run as root: this sandboxed Docker blocks the image's non-root uid 10001
    # from writing the host bind mount (./data/rustfs) even at mode 0777
    # (uid-remap/overlay quirk). Root is the only reliable fix here while
    # keeping the host-bind persistence model below.
    user: "0:0"
    ports:
      - '${DOCKER_GATEWAY_IP:-127.0.0.1}:9100:9000'  # S3 API (mapped to 9100 to avoid conflicts)
      - '${DOCKER_GATEWAY_IP:-127.0.0.1}:9101:9001'  # Web console
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
    command: /data
    volumes:
      - ${YAR_DATA_DIR:-./data}/rustfs:/data
    healthcheck:
      test: ['CMD-SHELL', "curl -s http://localhost:9000/ | grep -q 'AccessDenied' || curl -sf http://localhost:9000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yar-network
    mem_limit: 2g
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # LiteLLM Proxy - Unified LLM + Embedding gateway (AWS Bedrock)
  # ══════════════════════════════════════════════════════════════════════════════
  litellm:
    container_name: yar-litellm
    build:
      context: ./services/litellm
      dockerfile: Dockerfile
    ports:
      - '${DOCKER_GATEWAY_IP:-127.0.0.1}:4000:4000'
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-master-key}
      - AWS_ROLE_ARN=${AWS_ROLE_ARN:-}
      - AWS_WEB_IDENTITY_TOKEN_FILE=${AWS_WEB_IDENTITY_TOKEN_FILE:-}
      - AWS_STS_REGIONAL_ENDPOINTS=${AWS_STS_REGIONAL_ENDPOINTS:-regional}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    volumes:
      - ${AWS_WEB_IDENTITY_TOKEN_FILE:-/dev/null}:${AWS_WEB_IDENTITY_TOKEN_FILE:-/dev/null}:ro
      - ./services/litellm/config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ['CMD', 'python', '-c', 'import socket; s=socket.socket(); s.settimeout(2); s.connect(("localhost",4000)); s.close()']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yar-network
    mem_limit: 1g
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════════════════════
  # Phoenix - OpenTelemetry trace UI backed by PostgreSQL
  # setup.sh/start.sh start this by default via the observability profile
  # ══════════════════════════════════════════════════════════════════════════════
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: yar-phoenix
    profiles:
      - observability
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://yar:${POSTGRES_PASSWORD:-yar_pass}@postgres:5432/yar
      PHOENIX_SQL_DATABASE_SCHEMA: phoenix
      PHOENIX_PORT: 6006
      PHOENIX_GRPC_PORT: 4317
      PHOENIX_TELEMETRY_ENABLED: ${PHOENIX_TELEMETRY_ENABLED:-false}
    ports:
      # 0.0.0.0 (not gateway-only) so a localhost-targeting reverse proxy
      # (e.g. jupyter-server-proxy at /proxy/6006) can reach the dashboard;
      # 172.28.0.1 is still covered for the OTEL collector endpoint.
      - '6006:6006'
      - '${DOCKER_GATEWAY_IP:-127.0.0.1}:4317:4317'
    healthcheck:
      # phoenix image is distroless (no shell); use exec-form python against /healthz
      test: ['CMD', 'python', '-c', "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:6006/healthz', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - yar-network
    mem_limit: 1g
    restart: unless-stopped

# All persistent data lives on the host filesystem under ${YAR_DATA_DIR:-./data}
# so it survives Docker daemon resets and is easy to back up. See setup.sh which
# creates the directories with the correct permissions on first run.