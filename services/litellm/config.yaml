# LiteLLM Unified Config for mixed providers (OpenRouter LLM + Bedrock embeddings)
# Provides both LLM and Embedding endpoints via single proxy
#
# YAR uses:
#   - LLM_MODEL=beepboop           → bytedance-seed/seed-1.6-flash (via OpenRouter)
#   - EMBEDDING_MODEL=titan-embed  → Titan Embed Text v2 (1024 dims)

model_list:
  # ══════════════════════════════════════════════════════════════════════════════
  # LLM - Bytedance Seed 1.6 Flash via OpenRouter (OpenAI-compatible API)
  # ══════════════════════════════════════════════════════════════════════════════

  - model_name: beepboop
    litellm_params:
      model: openai/bytedance-seed/seed-1.6-flash
      api_base: os.environ/OPENROUTER_API_BASE
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 200000
      mode: chat
      supports_function_calling: true

  - model_name: bytedance-seed/seed-1.6-flash
    litellm_params:
      model: openai/bytedance-seed/seed-1.6-flash
      api_base: os.environ/OPENROUTER_API_BASE
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      max_tokens: 200000
      mode: chat
      supports_function_calling: true

  # ══════════════════════════════════════════════════════════════════════════════
  # Embedding - Bedrock Titan Embed Text v2
  # 1024 dimensions, 8192 token limit, ~65ms latency
  # ══════════════════════════════════════════════════════════════════════════════

  - model_name: titan-embed
    litellm_params:
      model: bedrock/amazon.titan-embed-text-v2:0
      aws_region_name: us-east-1

general_settings:
  master_key: ${LITELLM_MASTER_KEY}
  complete_response_logging: false
  allow_requests_on_db_unavailable: true
  disable_spend_logs: true
  disable_error_logs: true

litellm_settings:
  drop_params: true
  set_verbose: false
  ssl_verify: false
  cache: false
  json_logs: false
  num_retries: 3
  request_timeout: 120
  stream_options: { 'include_usage': true }
  default_litellm_params:
    encoding_format: float
