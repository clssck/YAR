# LiteLLM Unified Config for YAR (dev)
# Auto-generated by scripts/generate_litellm_config.sh
#
# YAR uses:
#   - LLM_MODEL=tuna              → mistralai/mistral-small-2603 via OpenRouter
#   - EMBEDDING_MODEL=shrimp      → perplexity/pplx-embed-v1-0.6b via OpenRouter
# Extra aliases:
#   - salmon                      → google/gemini-3.1-flash-lite-preview via OpenRouter

model_list:
  - model_name: tuna
    litellm_params:
      model: openai/mistralai/mistral-small-2603
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: salmon
    litellm_params:
      model: openai/google/gemini-3.1-flash-lite-preview
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY
    model_info:
      mode: chat
      supports_function_calling: true

  - model_name: shrimp
    litellm_params:
      model: openai/perplexity/pplx-embed-v1-0.6b
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  complete_response_logging: false
  allow_requests_on_db_unavailable: true
  disable_spend_logs: true
  disable_error_logs: true

litellm_settings:
  drop_params: true
  set_verbose: false
  ssl_verify: false
  cache: false
  json_logs: false
  num_retries: 3
  request_timeout: 120
  stream_options: { 'include_usage': true }
  default_litellm_params:
    encoding_format: float
